<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- SEBI Logo - Securities and Exchange Board of India -->
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" stroke="#0066CC" stroke-width="2"/>
  
  <!-- Inner decorative elements -->
  <circle cx="100" cy="100" r="80" stroke="#0066CC" stroke-width="1" opacity="0.5"/>
  
  <!-- Shield shape representing security -->
  <path d="M 100 40 L 130 55 L 130 90 Q 100 115 100 115 Q 100 115 70 90 L 70 55 Z" 
        fill="none" stroke="#0066CC" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Central emblem -->
  <circle cx="100" cy="75" r="8" fill="#0066CC"/>
  <circle cx="100" cy="95" r="6" fill="#0066CC"/>
  
  <!-- SEBI Text -->
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" 
        text-anchor="middle" fill="#0066CC" letter-spacing="2">SEBI</text>
  
  <!-- Registration badge indicator -->
  <circle cx="145" cy="55" r="12" fill="#00A86B" opacity="0.9"/>
  <text x="145" y="61" font-family="Arial, sans-serif" font-size="10" font-weight="bold" 
        text-anchor="middle" fill="white">✓</text>
</svg>